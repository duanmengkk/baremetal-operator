              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HostNetworkAttachmentSpec defines the desired switchport
              configuration.
            properties:
